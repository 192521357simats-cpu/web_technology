<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gourmet Haven | Gallery</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <nav class="navbar container" aria-label="Primary navigation">
      <a class="brand" href="index.html">Gourmet Haven</a>
      <button class="nav-toggle" type="button" aria-label="Toggle navigation" aria-expanded="false"><span></span><span></span><span></span></button>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="menu.html">Menu</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a class="active" href="gallery.html">Gallery</a></li>
        <li><a href="reservation.html">Reservation</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="page-hero">
      <div class="container">
        <p class="eyebrow handwritten">Atmosphere</p>
        <h1>Gallery</h1>
        <p>A glimpse of the plates, room, and details that shape each visit.</p>
      </div>
    </section>

    <section class="section gallery-cinema">
      <div class="gallery-stage" aria-label="Cinematic gallery">
        <button class="gallery-control prev" type="button" aria-label="Previous image">&#8592;</button>
        <div class="gallery-track">
          <figure class="gallery-slide">
            <img src="images/Gourmet_dish.jpeg" alt="Gourmet dish on black plate">
            <figcaption>An Evening Begins.</figcaption>
          </figure>
          <figure class="gallery-slide">
            <img src="images/Wine.jpeg" alt="Restaurant table setting with gold accents and wine">
            <figcaption>Intimate Dining.</figcaption>
          </figure>
          <figure class="gallery-slide">
            <img src="images/Chef_plating.jpeg" alt="Chef preparing ingredients">
            <figcaption>Crafted Slowly.</figcaption>
          </figure>
          <figure class="gallery-slide">
            <img src="images/Truffle_risotto.jpeg" alt="Truffle risotto finished with herbs">
            <figcaption>Chef's Signature.</figcaption>
          </figure>
          <figure class="gallery-slide">
            <img src="images/Berry_panna_cotta.jpeg" alt="Berry panna cotta dessert">
            <figcaption>Sweet Finishes.</figcaption>
          </figure>
          <figure class="gallery-slide">
            <img src="images/hero.png" alt="Luxury restaurant dining area">
            <figcaption>Heaven.</figcaption>
          </figure>
          <figure class="gallery-slide">
            <img src="images/Chocolate.jpeg" alt="Dark chocolate torte dessert">
            <figcaption>One Last Spoon.</figcaption>
          </figure>
          <figure class="gallery-slide">
            <img src="images/Lobster_tail.jpeg" alt="Plated seafood entree">
            <figcaption>Sea Herbs & Candlelight.</figcaption>
          </figure>
          <figure class="gallery-slide">
            <img src="images/Grilled_steak.jpeg" alt="Grilled steak with sauce">
            <figcaption>For the Bordeaux Hour.</figcaption>
          </figure>
          <figure class="gallery-slide">
            <img src="images/filet_mignon.jpeg" alt="Filet mignon with roasted vegetables">
            <figcaption>Polished, Never Stiff.</figcaption>
          </figure>
          <figure class="gallery-slide">
            <img src="images/Dessert_assortment.jpeg" alt="Assorted French desserts">
            <figcaption>Sweet Finishes.</figcaption>
          </figure>
        </div>
        <button class="gallery-control next" type="button" aria-label="Next image">&#8594;</button>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-content">
      <p>&copy; 2026 Gourmet Haven. All rights reserved.</p>
      <p>Fine Dining | Private Events | Seasonal Menus</p>
    </div>
  </footer>

  <script src="js/script.js?v=gallery-controls"></script>
</body>
</html>
